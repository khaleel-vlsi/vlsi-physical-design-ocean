name: Scrape VLSI Jobs

on:
  schedule:
    # Run every 24 hours at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install @supabase/supabase-js ws
      # We just install the supabase client specifically since it's the only runtime dependency for the script.
      # Or run full npm ci if needed, but this is faster for just running the script.

    - name: Run Job Scraper
      run: node scripts/automated_scraper.js
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
