<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password | VLSI PD Ocean</title>

  <style>
    body{
      margin:0; min-height:100vh;
      font-family:Arial, sans-serif;
      display:flex; align-items:center; justify-content:center;
      background: linear-gradient(160deg,#041427,#062a4a);
      color:#eaf6ff;
      padding:20px;
    }
    .card{
      width:min(520px, 100%);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:18px;
    }
    h1{margin:0 0 10px}
    p{color:rgba(234,246,255,.78); line-height:1.45}
    label{display:block; margin:12px 0 6px; color:rgba(234,246,255,.78)}
    input{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.20);
      color:#eaf6ff;
      outline:none;
    }
    button{
      margin-top:14px;
      width:100%;
      padding:12px;
      border-radius:14px;
      border:0;
      background: linear-gradient(135deg,#4fd1ff,#1fb6ff);
      color:#001a2a;
      font-weight:900;
      cursor:pointer;
    }
    .msg{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      background: rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.14);
      white-space:pre-wrap;
      display:none;
    }
    .ok{display:block; border-color: rgba(54,211,153,.35)}
    .err{display:block; border-color: rgba(255,92,122,.35)}
    a{color:#4fd1ff}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>
</head>
<body>
  <div class="card">
    <h1>🔑 Reset Password</h1>
    <p>
      Enter your new password below.
      After success, you will be redirected to Login.
    </p>

    <label>New Password</label>
    <input id="p1" type="password" placeholder="New password" />

    <label>Confirm Password</label>
    <input id="p2" type="password" placeholder="Confirm new password" />

    <button onclick="updatePassword()">Update Password</button>

    <div id="msg" class="msg"></div>

    <p style="margin-top:12px">
      <a href="./login.html">← Back to Login</a>
    </p>
  </div>

  <script>
    const sb = window.sb || window.supabaseClient || window.supabase;

    function setMsg(text, ok){
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + (ok ? "ok" : "err");
    }

    async function updatePassword(){
      const p1 = document.getElementById("p1").value;
      const p2 = document.getElementById("p2").value;

      if(!p1 || !p2){
        setMsg("❌ Please enter both password fields.", false);
        return;
      }
      if(p1 !== p2){
        setMsg("❌ Passwords do not match.", false);
        return;
      }
      if(!sb || !sb.auth){
        setMsg("❌ Supabase client not loaded. Check supabaseClient.js", false);
        return;
      }

      setMsg("Updating password...", true);

      const { error } = await sb.auth.updateUser({ password: p1 });

      if(error){
        setMsg("❌ Update failed: " + error.message + "\n\nTip: Open reset link in SAME browser where it was received.", false);
        return;
      }

      setMsg("✅ Password updated successfully!\nRedirecting to login...", true);
      setTimeout(()=> location.href="./login.html", 1200);
    }

    // Optional: show user if session exists
    (async ()=>{
      try{
        const { data } = await sb.auth.getSession();
        if(!data?.session){
          setMsg(
            "⚠️ No active reset session found.\n\nPlease open the reset email link again (copy-paste full link into browser).",
            false
          );
        }
      }catch(e){
        // ignore
      }
    })();
  </script>
</body>
</html>
