<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password | VLSI PD Ocean</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>

  <style>
    :root{
      --bg1:#041726; --bg2:#020b12;
      --glass:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:#eaf7ff;
      --muted:rgba(234,247,255,.78);
      --accent1:#00b4ff; --accent2:#00ffc8;
      --shadow:rgba(0,0,0,.45);
      --good:#7CFFB2; --bad:#ff9aa7;
    }
    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(0,180,255,.26), transparent 60%),
        radial-gradient(900px 600px at 85% 18%, rgba(0,255,200,.18), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 65%, #01060b);
      min-height:100vh;
      padding:26px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .card{
      width:min(560px,100%);
      border:1px solid var(--border);
      background:var(--glass);
      border-radius:18px;
      padding:18px;
      box-shadow:0 18px 60px var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1{margin:0 0 6px; font-size:20px;}
    .muted{color:var(--muted); font-size:13px; line-height:1.55}
    .hr{height:1px; background:rgba(255,255,255,.12); margin:14px 0;}
    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
      font-size:14px;
      box-sizing:border-box;
    }
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px;}
    .btn{
      padding:11px 14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      color:#021016;
      cursor:pointer;
      font-weight:900;
      font-size:13px;
      display:inline-flex;
      gap:8px;
      align-items:center;
    }
    .msg{margin-top:10px; font-size:13px;}
    .ok{color:var(--good)}
    .err{color:var(--bad)}
    a{color:#9be7ff}
  </style>
</head>

<body>
  <div class="card">
    <h1>🔁 Set New Password</h1>
    <div class="muted">Enter your new password below.</div>

    <div class="hr"></div>

    <label>New Password</label>
    <input id="p1" type="password" placeholder="New password" />
    <label>Confirm Password</label>
    <input id="p2" type="password" placeholder="Confirm password" />

    <div style="margin-top:12px;">
      <button class="btn" onclick="updatePass()">✅ Update Password</button>
    </div>

    <div class="msg" id="m"></div>

    <div class="hr"></div>
    <div class="muted">
      After success, go to <a href="./login.html">Login</a>.
    </div>
  </div>

  <script>
    const sb = window.sb;

    function setMsg(text, ok){
      const el = document.getElementById("m");
      el.className = "msg " + (ok ? "ok" : "err");
      el.innerHTML = text;
    }

    async function updatePass(){
      const p1 = document.getElementById("p1").value.trim();
      const p2 = document.getElementById("p2").value.trim();

      if(!p1 || !p2) return setMsg("Enter both password fields.", false);
      if(p1.length < 6) return setMsg("Password must be at least 6 characters.", false);
      if(p1 !== p2) return setMsg("Passwords do not match.", false);

      const { error } = await sb.auth.updateUser({ password: p1 });
      if(error) return setMsg(error.message, false);

      setMsg("Password updated ✅ Now login with new password.", true);
      setTimeout(() => location.href="./login.html", 1200);
    }
  </script>
</body>
</html>
