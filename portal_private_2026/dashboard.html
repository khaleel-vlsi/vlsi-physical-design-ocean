<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard | VLSI Physical Design Ocean</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#041726;
      color:white;
      padding:20px;
    }

    .card{
      background:#0a2a3d;
      padding:20px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .btn{
      padding:10px 15px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      margin-top:10px;
      display:inline-block;
      text-decoration:none;
      font-weight:bold;
    }

    .buy{background:gold;color:black;}
    .open{background:#00ffc8;color:black;}
    .danger{background:#ff9aa7;}
  </style>
</head>

<body>

<h2>📘 Student Dashboard</h2>

<div id="hello">Loading...</div>

<div class="card">
  <h3>🌊 Paid Modules</h3>
  <div id="courseStatus">Checking...</div>

  <a id="courseBtn" class="btn open" href="./paid/" style="display:none;">Open Paid Modules</a>

  <!-- PAYMENT LINK -->
  <a id="buy499Btn" class="btn buy"
     href="https://rzp.io/rzp/xdogbsA"
     target="_self"
     style="display:none;">
     💳 Pay ₹499
  </a>
</div>

<div class="card">
  <h3>🚀 Placement Support</h3>
  <div id="placementStatus">Checking...</div>

  <a id="placementBtn" class="btn open" href="./placement/" style="display:none;">Open Placement</a>

  <!-- PAYMENT LINK -->
  <a id="buy1999Btn" class="btn buy"
     href="https://rzp.io/rzp/rCnkpRSH"
     target="_self"
     style="display:none;">
     🚀 Pay ₹1999
  </a>
</div>

<button class="btn danger" onclick="logout()">Logout</button>

<script>

const sb = window.sb;

function isFuture(ts){
  if(!ts) return false;
  return new Date(ts).getTime() > Date.now();
}

async function logout(){
  await sb.auth.signOut();
  location.href="./login.html";
}

async function main(){

  const { data:{user} } = await sb.auth.getUser();

  if(!user){
    document.getElementById("hello").innerHTML="Please login";
    document.getElementById("buy499Btn").style.display="inline-block";
    document.getElementById("buy1999Btn").style.display="inline-block";
    return;
  }

  document.getElementById("hello").innerHTML="Welcome "+user.email;

  const {data} = await sb
    .from("profiles")
    .select("*")
    .eq("id",user.id)
    .single();

  const courseValid = data?.course_active && isFuture(data.course_expiry);
  const placementValid = data?.placement_active && isFuture(data.placement_expiry);

  // COURSE
  if(courseValid){
    document.getElementById("courseStatus").innerHTML="Unlocked ✅";
    document.getElementById("courseBtn").style.display="inline-block";
  }else{
    document.getElementById("courseStatus").innerHTML="Locked 🔒";
    document.getElementById("buy499Btn").style.display="inline-block";
  }

  // PLACEMENT
  if(placementValid){
    document.getElementById("placementStatus").innerHTML="Unlocked ✅";
    document.getElementById("placementBtn").style.display="inline-block";
  }else{
    document.getElementById("placementStatus").innerHTML="Locked 🔒";
    document.getElementById("buy1999Btn").style.display="inline-block";
  }
}

main();

</script>

</body>
</html>
