    <script type="text/javascript">
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(255, 0, 0, 0.95)';
        div.style.color = 'white';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.lineHeight = '1.5';
        div.innerHTML = '<h1 style="margin-top:0;">Global JS Error Caught</h1>' +
          '<p><strong>Message:</strong> ' + message + '</p>' +
          '<p><strong>Source:</strong> ' + source + '</p>' +
          '<p><strong>Line:</strong> ' + lineno + ' <strong>Column:</strong> ' + colno + '</p>' +
          '<pre style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; white-space: pre-wrap; word-break: break-all;">' + (error ? error.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
        console.error("GLOBAL ERROR:", message, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(255, 0, 0, 0.95)';
        div.style.color = 'white';
        div.style.padding = '30px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.lineHeight = '1.5';
        div.innerHTML = '<h1 style="margin-top:0;">Unhandled Promise Rejection</h1>' +
          '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
          '<pre style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 5px; white-space: pre-wrap; word-break: break-all;">' + (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
        console.error("UNHANDLED REJECTION:", event.reason);
      };
    </script>
